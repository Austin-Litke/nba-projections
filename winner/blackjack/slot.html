<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slots</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --text: #e9ecff;
      --muted: #a9b0d6;
      --accent: #7c5cff;
      --good: #2dd4bf;
      --bad: #fb7185;
      --border: rgba(255,255,255,.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(124,92,255,.25), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(45,212,191,.18), transparent 50%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(860px, 100%);
      background: rgba(18,26,51,.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      overflow: hidden;
    }

    header {
      padding: 18px 22px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to right, rgba(124,92,255,.15), transparent);
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: .4px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .pill {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      background: rgba(255,255,255,.03);
    }
    .pill b { color: var(--text); font-weight: 650; }

    main {
      padding: 22px;
      display: grid;
      gap: 18px;
      grid-template-columns: 1.1fr .9fr;
    }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }

    .machine {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
    }

    .cell {
      height: 84px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 42px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      user-select: none;
      transition: transform .12s ease;
    }

    .payline {
      outline: 2px solid rgba(124,92,255,.65);
      box-shadow: 0 0 0 6px rgba(124,92,255,.12);
    }

    .controls {
      margin-top: 14px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .controls label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input[type="number"]{
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline: none;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 650;
      letter-spacing: .2px;
      transition: transform .05s ease, background .2s ease;
    }
    button:hover { background: rgba(255,255,255,.10); }
    button:active { transform: translateY(1px); }
    button.primary {
      background: rgba(124,92,255,.22);
      border-color: rgba(124,92,255,.5);
    }
    button.primary:hover { background: rgba(124,92,255,.30); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .msg {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
    }

    .msg.good { color: var(--good); }
    .msg.bad  { color: var(--bad); }

    .table {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(255,255,255,.10);
      padding-bottom: 6px;
    }
    .row:last-child { border-bottom: none; padding-bottom: 0; }
    .row span:first-child { color: var(--text); }

    .tiny {
      font-size: 12px;
      color: rgba(233,236,255,.7);
      margin-top: 10px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🎰 Slot Machine</h1>
      <div class="stats">
        <div class="pill">Balance: <b id="balance">$100</b></div>
        <div class="pill">Last Win: <b id="lastWin">$0</b></div>
      </div>
    </header>

    <main>
      <section class="machine">
        <div class="grid" id="grid"></div>

        <div class="controls">
          <label>
            Bet
            <input id="bet" type="number" min="1" step="1" value="5" />
          </label>

          <label>
            Deposit (add money)
            <input id="deposit" type="number" min="1" step="1" placeholder="e.g. 50" />
          </label>
        </div>

        <div class="actions">
          <button class="primary" id="spinBtn">SPIN</button>
          <button id="depositBtn">DEPOSIT</button>
          <button id="resetBtn">RESET</button>
        </div>
      </section>

      <aside class="side">
        <div class="card">
          <p class="msg" id="message">Middle row is the payline. Match symbols to win.</p>
          <div class="tiny">
            Rules:
            <ul>
              <li><b>3 of a kind</b> (payline) pays the multiplier × bet.</li>
              <li><b>2 of a kind</b> pays a smaller multiplier × bet.</li>
              <li><b>7️⃣ + 💎 combo</b> (all different) gives a small bonus.</li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div style="font-weight:700; margin-bottom:8px;">Payouts (3 in a row)</div>
          <div class="table" id="payoutTable"></div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    // ---------- Config ----------
    const SYMBOL_WEIGHTS = {
      "🍒": 10,
      "🍋": 9,
      "🍊": 8,
      "🍇": 7,
      "🔔": 5,
      "⭐": 3,
      "💎": 2,
      "7️⃣": 1
    };

    const PAYOUTS_3 = {
      "🍒": 3,
      "🍋": 4,
      "🍊": 5,
      "🍇": 6,
      "🔔": 10,
      "⭐": 20,
      "💎": 35,
      "7️⃣": 100
    };

    const PAYOUTS_2 = {
      "🍒": 1,
      "🍋": 1,
      "🍊": 2,
      "🍇": 2,
      "🔔": 3,
      "⭐": 5,
      "💎": 10,
      "7️⃣": 20
    };

    const SYMBOLS = Object.keys(SYMBOL_WEIGHTS);

    // ---------- State ----------
    let balance = 100;
    let lastWin = 0;
    let spinning = false;

    // ---------- DOM ----------
    const gridEl = document.getElementById("grid");
    const balanceEl = document.getElementById("balance");
    const lastWinEl = document.getElementById("lastWin");
    const betEl = document.getElementById("bet");
    const depositEl = document.getElementById("deposit");
    const msgEl = document.getElementById("message");

    const spinBtn = document.getElementById("spinBtn");
    const depositBtn = document.getElementById("depositBtn");
    const resetBtn = document.getElementById("resetBtn");

    const payoutTableEl = document.getElementById("payoutTable");

    // ---------- Utils ----------
    function weightedPick() {
      const total = SYMBOLS.reduce((sum, s) => sum + SYMBOL_WEIGHTS[s], 0);
      let r = Math.random() * total;
      for (const s of SYMBOLS) {
        r -= SYMBOL_WEIGHTS[s];
        if (r <= 0) return s;
      }
      return SYMBOLS[0];
    }

    function buildGrid() {
      // 3 rows x 3 cols
      const g = [];
      for (let r = 0; r < 3; r++) {
        const row = [];
        for (let c = 0; c < 3; c++) row.push(weightedPick());
        g.push(row);
      }
      return g;
    }

    function renderGrid(g) {
      gridEl.innerHTML = "";
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const cell = document.createElement("div");
          cell.className = "cell" + (r === 1 ? " payline" : "");
          cell.textContent = g[r][c];
          gridEl.appendChild(cell);
        }
      }
    }

    function calcPayout(payline, bet) {
      // payline is [a,b,c]
      const counts = {};
      for (const s of payline) counts[s] = (counts[s] || 0) + 1;

      // Find most common symbol
      let bestSym = null;
      let bestCount = 0;
      for (const [sym, cnt] of Object.entries(counts)) {
        if (cnt > bestCount) { bestCount = cnt; bestSym = sym; }
      }

      // 3 of a kind
      if (bestCount === 3) {
        return { win: PAYOUTS_3[bestSym] * bet, msg: `3x ${bestSym}!` };
      }

      // 2 of a kind
      if (bestCount === 2) {
        return { win: PAYOUTS_2[bestSym] * bet, msg: `2x ${bestSym}` };
      }

      // Bonus combo
      if (counts["7️⃣"] && counts["💎"]) {
        return { win: 3 * bet, msg: "Lucky combo (7️⃣ + 💎)!" };
      }

      return { win: 0, msg: "No win" };
    }

    function setMessage(text, type = "") {
      msgEl.className = "msg" + (type ? ` ${type}` : "");
      msgEl.textContent = text;
    }

    function syncUI() {
      balanceEl.textContent = `$${balance}`;
      lastWinEl.textContent = `$${lastWin}`;
      betEl.max = Math.max(1, balance);
      spinBtn.disabled = spinning || balance <= 0;
    }

    function sleep(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    // ---------- Actions ----------
    async function spin() {
      if (spinning) return;

      const bet = Math.floor(Number(betEl.value));
      if (!Number.isFinite(bet) || bet < 1) {
        setMessage("Enter a valid bet (>= 1).", "bad");
        return;
      }
      if (bet > balance) {
        setMessage("Not enough balance for that bet.", "bad");
        return;
      }

      spinning = true;
      lastWin = 0;
      setMessage("Spinning…", "");

      balance -= bet;
      syncUI();

      // Simple spin animation: rapidly render random grids
      for (let i = 0; i < 12; i++) {
        renderGrid(buildGrid());
        await sleep(55 + i * 6);
      }

      const finalGrid = buildGrid();
      renderGrid(finalGrid);

      const payline = finalGrid[1];
      const result = calcPayout(payline, bet);

      lastWin = result.win;
      balance += result.win;

      if (result.win > 0) {
        setMessage(`${result.msg} You won $${result.win}!`, "good");
      } else {
        setMessage(`${result.msg}. Try again!`, "bad");
      }

      spinning = false;
      syncUI();
    }

    function deposit() {
      const amt = Math.floor(Number(depositEl.value));
      if (!Number.isFinite(amt) || amt < 1) {
        setMessage("Enter a valid deposit amount (>= 1).", "bad");
        return;
      }
      balance += amt;
      depositEl.value = "";
      setMessage(`Deposited $${amt}.`, "good");
      syncUI();
    }

    function reset() {
      balance = 100;
      lastWin = 0;
      setMessage("Reset complete. Middle row is the payline.", "");
      renderGrid(buildGrid());
      syncUI();
    }

    // ---------- Init ----------
    function renderPayoutTable() {
      payoutTableEl.innerHTML = "";
      const entries = Object.entries(PAYOUTS_3)
        .sort((a,b) => a[1] - b[1]); // low to high

      for (const [sym, mult] of entries) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<span>${sym} ×3</span><span>${mult}× bet</span>`;
        payoutTableEl.appendChild(row);
      }
    }

    spinBtn.addEventListener("click", spin);
    depositBtn.addEventListener("click", deposit);
    resetBtn.addEventListener("click", reset);

    renderPayoutTable();
    renderGrid(buildGrid());
    syncUI();
  </script>
</body>
</html>
