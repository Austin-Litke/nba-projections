<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLB Room</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← Back to Winner Arcade</a>

    <header class="hero">
      <h1>⚾ MLB Room</h1>
      <p>Pitcher strikeout predictor skeleton</p>
    </header>

    <section class="card">
      <h2>Status</h2>
      <div id="status">Loading...</div>
    </section>

    <section class="card">
      <h2>Scoreboard</h2>
      <button id="refreshBtn">Refresh</button>
      <div id="scoreboardOut">No data yet.</div>
    </section>
  </div>
    <section class="card">
      <h2>Pitcher Detail</h2>
      <div id="pitcherStatus" class="muted">Click a probable pitcher to load details.</div>
      <div id="pitcherDetail"></div>
      <div id="pitcherLineup"></div>
      <div id="pitcherProjection"></div>
      <div id="pitcherLines"></div>
      <div id="pitcherGameLog"></div>
    </section>

    <section class="card">
      <h2>Daily Best Picks</h2>
      <div id="bestPicksOut" class="muted">No best picks loaded yet.</div>
    </section>

    <section class="card">
      <h2>Tracked Picks</h2>
      <button id="trackBtn">Track Current Pick</button>
      <button id="refreshTrackedBtn">Refresh Tracked</button>
      <button id="settleAllBtn">Settle All Pending</button>
      <div id="trackStatus" class="muted"></div>

      <div style="margin:10px 0;">
        <select id="trackedFilter">
          <option value="all">All picks</option>
          <option value="pending">Pending only</option>
          <option value="settled">Settled only</option>
          <option value="plus_ev">+EV only</option>
        </select>
      </div>

      <div style="margin:10px 0;">
        <select id="trackedSort">
          <option value="newest">Newest first</option>
          <option value="highest_ev">Highest EV</option>
          <option value="highest_prob">Highest probability</option>
          <option value="pending_first">Pending first</option>
          <option value="settled_first">Settled first</option>
        </select>
      </div>


      <div id="trackedOut"></div>
    </section>


  <script type="module" src="./js/main.js"></script>
</body>
</html>
