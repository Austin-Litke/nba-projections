<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roulette</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="../index.html">← Arcade</a>
      <h1>🎡 Roulette (European)</h1>
      <div class="hud">
        <div class="pill">Bankroll: <b id="bankroll">$1000</b></div>
        <div class="pill">Bet: <b id="betLabel">$10</b></div>
        <div class="pill">Last Win: <b id="lastWin">$0</b></div>
      </div>
    </header>

    <div class="board">
      <div class="wheelWrap">
        <div class="pointer">▼</div>
        <div class="wheel" id="wheel">
    <div class="wheelInner" id="wheelInner"></div>

  <!-- Ball ring sits above the wheel -->
    <div class="ballRing" id="ballRing">
         <div class="ball"></div>
         </div>
    </div>

        <div class="result" id="result">Result: —</div>
        <div class="history" id="history"></div>
      </div>

      <div class="panel">
        <div class="left">
          <div class="row">
            <span class="muted">Bet Amount</span>
            <input id="betInput" type="number" min="1" step="1" value="10" />
            <button id="maxBtn">Max</button>
          </div>

          <div class="row">
            <span class="muted">Bet Type</span>
            <select id="betType">
              <option value="number">Straight Number (35:1)</option>
              <option value="red">Red (1:1)</option>
              <option value="black">Black (1:1)</option>
              <option value="even">Even (1:1)</option>
              <option value="odd">Odd (1:1)</option>
              <option value="dozen1">1st Dozen 1–12 (2:1)</option>
              <option value="dozen2">2nd Dozen 13–24 (2:1)</option>
              <option value="dozen3">3rd Dozen 25–36 (2:1)</option>
            </select>
          </div>

          <div class="row" id="numberRow">
            <span class="muted">Pick Number</span>
            <input id="numberPick" type="number" min="0" max="36" step="1" value="17" />
          </div>

          <div class="row">
            <button id="spinBtn" class="primary">SPIN</button>
            <button id="resetBtn" class="danger">Reset $</button>
          </div>

          <div id="msg" class="msg">Choose a bet and spin.</div>
        </div>

        <div class="right">
          <div class="paytitle">Quick Rules</div>
          <div class="rules">
            <div>🎯 Number pays <b>35:1</b></div>
            <div>🟥/⬛/Even/Odd pays <b>1:1</b></div>
            <div>12s pay <b>2:1</b></div>
            <div>European wheel includes <b>0</b> (green)</div>
          </div>
        </div>
      </div>

      <div class="chip" id="chip">🟡 +$0</div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
